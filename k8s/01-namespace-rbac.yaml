# ============================================================
# Namespace & RBAC
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: devops-agent
  labels:
    app.kubernetes.io/part-of: devops-agent
---
# Service account for the collector to read K8s API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-collector
  namespace: devops-agent
---
# ClusterRole: read pods, events, metrics across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-agent-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "events", "services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-agent-reader-binding
subjects:
  - kind: ServiceAccount
    name: devops-collector
    namespace: devops-agent
roleRef:
  kind: ClusterRole
  name: devops-agent-reader
  apiGroup: rbac.authorization.k8s.io
