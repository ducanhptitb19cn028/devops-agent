# ============================================================
# AI Agent Deployment (Step 4)
# Queries backend, sends to Claude API, stores analysis
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-ai-agent
  namespace: devops-agent
  labels:
    app: devops-ai-agent
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-ai-agent
  template:
    metadata:
      labels:
        app: devops-ai-agent
        component: agent
    spec:
      containers:
        - name: agent
          image: devops-agent/agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_URL
              value: http://devops-backend.devops-agent.svc.cluster.local:8000
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-secrets
                  key: ANTHROPIC_API_KEY
            - name: CLAUDE_MODEL
              value: claude-sonnet-4-20250514
            - name: ANALYSIS_INTERVAL
              value: "300"
            - name: LOOKBACK_MINUTES
              value: "30"
            - name: RUN_MODE
              value: continuous
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
