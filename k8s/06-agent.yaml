# ============================================================
# AI Agent Deployment (Step 4)
# Queries backend, sends to Claude API or ML model server, stores analysis
#
# ANALYZER_MODE:
#   "claude" — Uses Claude API (default, requires ANTHROPIC_API_KEY)
#   "ml"     — Uses local ML model server (requires 08-ml-server.yaml deployed)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-ai-agent
  namespace: devops-agent
  labels:
    app: devops-ai-agent
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-ai-agent
  template:
    metadata:
      labels:
        app: devops-ai-agent
        component: agent
    spec:
      containers:
        - name: agent
          image: devops-agent/agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_URL
              value: http://devops-backend.devops-agent.svc.cluster.local:8000

            # ── Analyzer mode ─────────────────────────────────
            # Set to "ml" to use local ML models instead of Claude API
            - name: ANALYZER_MODE
              value: "claude"            # change to "ml" for ML mode

            # ── Claude API settings (used when ANALYZER_MODE=claude) ──
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: devops-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true         # not required when using ML mode
            - name: CLAUDE_MODEL
              value: claude-sonnet-4-20250514

            # ── ML server settings (used when ANALYZER_MODE=ml) ──
            - name: ML_SERVER_URL
              value: http://devops-ml-server.devops-agent.svc.cluster.local:8001
            - name: ML_TIMEOUT
              value: "30"

            # ── General settings ──────────────────────────────
            - name: ANALYSIS_INTERVAL
              value: "300"
            - name: LOOKBACK_MINUTES
              value: "30"
            - name: RUN_MODE
              value: continuous
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
