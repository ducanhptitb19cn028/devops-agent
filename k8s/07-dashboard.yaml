apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-dashboard
  namespace: devops-agent
  labels:
    app: devops-dashboard
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-dashboard
  template:
    metadata:
      labels:
        app: devops-dashboard
        component: ui
    spec:
      containers:
        - name: dashboard
          image: devops-agent/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: devops-dashboard
  namespace: devops-agent
  labels:
    app: devops-dashboard
spec:
  selector:
    app: devops-dashboard
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
