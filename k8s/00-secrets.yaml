# ============================================================
# Secrets (apply BEFORE other manifests)
# Replace placeholder values with your actual credentials
# ============================================================
#
# Recommended: create via kubectl instead of applying this file:
#
#   kubectl create secret generic devops-secrets \
#     --namespace devops-agent \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-api03-xxxxx \
#     --from-literal=POSTGRES_PASSWORD=your-secure-db-password \
#     --from-literal=REDIS_PASSWORD=your-redis-password
#
apiVersion: v1
kind: Secret
metadata:
  name: devops-secrets
  namespace: devops-agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-api03-REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
