# ============================================================
# Prometheus ConfigMap Patch — on-demand-observability namespace
# Adds remote_write to VictoriaMetrics in devops-agent namespace
#
# Apply with:
#   kubectl apply -f prometheus-remote-write-patch.yaml
#
# This REPLACES the existing prometheus-config ConfigMap in the
# on-demand-observability namespace. All original scrape_configs
# are preserved; only remote_write is added.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: on-demand-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    # ── Remote Write to VictoriaMetrics TSDB ──────────────────
    # All scraped metrics are forwarded to VictoriaMetrics for
    # long-term retention (30d) with automatic downsampling.
    remote_write:
      - url: http://victoriametrics.devops-agent.svc.cluster.local:8428/api/v1/write
        queue_config:
          max_samples_per_send: 10000
          batch_send_deadline: 5s
          max_shards: 3
          min_backoff: 100ms
          max_backoff: 5s
        write_relabel_configs:
          # Forward all metrics — no filtering
          - source_labels: [__name__]
            regex: ".*"
            action: keep

    # ── Scrape Configs (unchanged from original) ──────────────
    scrape_configs:
      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector:8889"]

      # Optional: scrape VictoriaMetrics internal metrics
      - job_name: "victoriametrics"
        static_configs:
          - targets: ["victoriametrics.devops-agent.svc.cluster.local:8428"]
        metrics_path: /metrics
