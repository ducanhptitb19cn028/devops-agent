# ============================================================
# VictoriaMetrics — Time Series Database (TSDB)
# Receives metrics via Prometheus remote_write
# Provides PromQL-compatible query API for long-range analysis
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: victoriametrics
  namespace: devops-agent
  labels:
    app: victoriametrics
    component: tsdb
spec:
  serviceName: victoriametrics
  replicas: 1
  selector:
    matchLabels:
      app: victoriametrics
  template:
    metadata:
      labels:
        app: victoriametrics
        component: tsdb
    spec:
      containers:
        - name: victoriametrics
          image: victoriametrics/victoria-metrics:v1.106.1
          args:
            # Retention — keep 30 days of metric data
            - "--retentionPeriod=30d"
            # Storage path
            - "--storageDataPath=/victoria-metrics-data"
            # Accept Prometheus remote_write
            - "--httpListenAddr=:8428"
            # Enable downsampling: after 7d keep 5m resolution,
            # after 30d keep 1h resolution
            - "--downsampling.period=7d:5m,30d:1h"
            # Deduplication window for HA Prometheus setups
            - "--dedup.minScrapeInterval=15s"
            # Memory limits for merge operations
            - "--memory.allowedPercent=60"
            # Search limits
            - "--search.maxUniqueTimeseries=50000"
            - "--search.maxSamplesPerQuery=100000000"
            # Logging
            - "--loggerLevel=INFO"
          ports:
            - name: http
              containerPort: 8428
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: vm-data
              mountPath: /victoria-metrics-data
  volumeClaimTemplates:
    - metadata:
        name: vm-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: devops-agent
  labels:
    app: victoriametrics
spec:
  selector:
    app: victoriametrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
