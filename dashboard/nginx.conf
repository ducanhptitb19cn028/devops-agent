server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ─────────────────────────────────────
    # Proxies /api/* requests to the FastAPI backend service.
    # The backend service name must match the K8s service in 05-backend.yaml.
    location /api/ {
        proxy_pass http://devops-backend.devops-agent.svc.cluster.local:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── WebSocket reverse proxy ───────────────────────────────
    location /ws/ {
        proxy_pass http://devops-backend.devops-agent.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ── React SPA ─────────────────────────────────────────────
    # All other routes fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check ──────────────────────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
